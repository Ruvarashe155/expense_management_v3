{% extends "base.html" %}
{% load static %}

{% block title %}Expense Management Backup{% endblock %}

{% block content %}
<div class=" mt-5">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">
            <div class="card shadow-lg">
                <div class="card-body">
                    <h2 class="text-center mb-4">Expense Management Backup</h2>
                    <p class="text-center">Manage your backups easily by clicking the buttons below.</p>

                    <!-- Backup Button -->
                    <div class="d-grid mb-3">
                        <button onclick="backup()" class="btn btn-primary">
                            <i class="fas fa-save me-2"></i> Backup
                        </button>
                    </div>

                    <!-- Restore Button -->
                    <div class="d-grid">
                        <button onclick="restore()" class="btn btn-danger">
                            <i class="fas fa-undo-alt me-2"></i> Recover
                        </button>
                    </div>

                    <!-- Feedback Message -->
                    <div id="message" class="mt-4 text-center"></div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // Backup function
    function backup() {
        fetch('/backup/')
        .then(res => res.json())
        .then(data => {
            document.getElementById("message").innerHTML =
                `<div class="alert alert-success">${data.message}</div>`;
        })
        .catch(err => {
            document.getElementById("message").innerHTML =
                `<div class="alert alert-danger">An error occurred while backing up.</div>`;
        });
    }

    // Restore function
    function restore() {
        if (!confirm("This will overwrite your data. Continue?")) return;

        fetch('/restore/')
        .then(res => res.json())
        .then(data => {
            document.getElementById("message").innerHTML =
                `<div class="alert alert-warning">${data.message}</div>`;
        })
        .catch(err => {
            document.getElementById("message").innerHTML =
                `<div class="alert alert-danger">An error occurred while restoring.</div>`;
        });
    }
</script>
{% endblock content %}
