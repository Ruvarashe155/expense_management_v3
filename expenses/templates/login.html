{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Login{% endblock %}</title>

    <!-- Bootstrap & Fonts -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Roboto', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .auth-page {
            background-color: #fff;
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
            padding: 70px;
            border-radius: 12px;
            width: 100%;
            max-width: 800px;
            transition: transform 0.3s ease;
        }
        .auth-page:hover {
            transform: translateY(-5px);
        }

        .auth-page h2 {
            font-size: 28px;
            color: #333;
            font-weight: 600;
            margin-bottom: 20px;
        }

        .form-group label {
            font-size: 16px;
            font-weight: 500;
            margin-bottom: 6px;
        }

        .form-control {
            border-radius: 10px;
            padding: 12px 15px;
            font-size: 16px;
            border: 1px solid #ddd;
            transition: all 0.3s ease;
        }
        .form-control:focus {
            border-color: #667eea;
            box-shadow: 0 0 8px rgba(102,126,234,0.4);
        }

        .btn-login {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            color: white;
            width: 100%;
            padding: 12px;
            font-size: 16px;
            border-radius: 8px;
            font-weight: 600;
            transition: background 0.3s ease;
        }
        .btn-login:hover {
            background: linear-gradient(135deg, #5a67d8, #6b46c1);
        }

        .error-message {
            color: red;
            margin-top: 15px;
            text-align: center;
        }

        .logo {
            width: 80px;
            margin-bottom: 15px;
        }

        @media (max-width: 576px) {
            .auth-page {
                margin: 20px;
                padding: 30px;
                max-width: 100%;
            }
        }
    </style>
</head>

<body>
    <main class="auth-page text-center">
        <!-- Branding -->
        <img src="{% static 'images/logo.png' %}" alt="Logo" class="logo">
        <h2><strong>Expense Manager</strong></h2>

        <!-- Login Form -->
        <form action="{% url 'expenses:login' %}" method="post">
            {% csrf_token %}
            <div class="form-group mb-3 text-start">
                <label for="username">Username</label>
                <input type="text" name="username" id="username" placeholder="Enter your username" class="form-control" required>
            </div>

            <div class="form-group mb-3 text-start">
                <label for="password">Password</label>
                <input type="password" name="password" id="password" placeholder="Enter your password" class="form-control" required>
            </div>

            <button type="submit" class="btn-login">Login</button>
        </form>

        {% if form.errors %}
            <p class="error-message">Invalid username or password</p>
        {% endif %}

        <!-- Extra Links -->
        <div class="mt-3">
            <a href="{% url 'expenses:password_reset' %}" class="text-muted">Forgot Password?</a>
        </div>
    </main>
</body>
</html>
