{% extends "base.html" %}

{% block content %}
<div class=" mt-4">
    <h2 class="mb-4">Disburse Expense: {{ expense.name }}</h2>

    <form method="POST" class="needs-validation" novalidate>
        {% csrf_token %}

        <div class="form-group">
            <label for="payment_method">Payment Method</label>
            <select name="payment_method" id="payment_method" class="form-control" required>
                <option value="" disabled selected>Select a method</option>
                <option value="Cash">Cash</option>
                <option value="Bank Transfer">Bank Transfer</option>
                <option value="Mobile Money">Mobile Money</option>
                <option value="Cheque">Cheque</option>
            </select>
        </div>

        <div class="form-group">
            <label for="reference_number_id">Reference Number (optional)</label>
            <input type="text" name="reference_number" id="reference_number_id" class="form-control">
        </div>

        <div class="form-group">
            <label for="notes_id">Additional Notes</label>
            <textarea name="notes" id="notes_id" class="form-control" rows="3"></textarea>
        </div>

        <button type="submit" class="btn btn-success">Complete Disbursement</button>
    </form>
</div>
{% endblock %}
